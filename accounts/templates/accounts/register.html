{% extends "base.html" %}
{% block title %}Register — PhishGuard{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card bg-dark border-secondary">
      <div class="card-body p-4">
        <h4 class="mb-4 text-center">
          <i class="bi bi-person-plus text-primary me-2"></i>Create Account
        </h4>
        <form method="post" novalidate>
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label small text-muted">{{ field.label }}</label>
              <input type="{{ field.field.widget.input_type }}"
                     name="{{ field.html_name }}"
                     id="{{ field.id_for_label }}"
                     class="form-control {% if field.errors %}is-invalid{% endif %}"
                     value="{{ field.value|default:'' }}"
                     autocomplete="off">
              {% for error in field.errors %}
                <div class="invalid-feedback">{{ error }}</div>
              {% endfor %}
            </div>
          {% endfor %}
          <button type="submit" class="btn btn-primary w-100 mt-2">Register</button>
        </form>
        <p class="text-center text-muted small mt-3">
          Already have an account? <a href="{% url 'accounts:login' %}">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
